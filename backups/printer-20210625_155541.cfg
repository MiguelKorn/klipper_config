## Voron Design VORON2.4 350mm SKR 1.4 TMC2209 UART config

## *** THINGS TO CHANGE/CHECK: ***
## Z Endstop Switch location			[safe_z_home] section
## Homing end position				[gcode_macro G32] section
## Z Endstop Switch  offset for Z0		[stepper_z] section
## PID tune								[extruder] and [heater_bed] sections
## Fine tune E steps					[extruder] section

[mcu]
##	MCU for X/Y/E steppers main MCU
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_lpc1769_0BA0000AA49869AFBCF13E5EC62000F5-if00
##--------------------------------------------------------------------

[mcu z]
##	MCU for Z steppers
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_lpc1769_1050000BA39869AFED4D405EC12000F5-if00
##--------------------------------------------------------------------

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000    			#Max 4000
max_z_velocity: 15 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

#####################################################################
# 	Import settings
#####################################################################
[include configs/*.cfg]

#####################################################################
# 	Other settings
#####################################################################
[idle_timeout]
timeout: 1800

[safe_z_home]
##	XY Location of the Z Endstop Switch
##	Update -10,-10 to the XY coordinates of your endstop pin
##	(such as 157,305) after going through Z Endstop Pin
##	Location Definition step.
home_xy_position:230.5,350
speed:100
z_hop:10

[virtual_sdcard]
path: ~/gcode_files

[display_status]

[pause_resume]

